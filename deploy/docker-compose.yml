services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: flipo
      POSTGRES_PASSWORD: flipo
      POSTGRES_DB: flipo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flipo"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: deploy/docker/api.Dockerfile
    ports:
      - "8080:8080"
    environment:
      API_PORT: "8080"
      LOG_FILE: /var/log/flipo/api.log
      DATABASE_URL: postgres://flipo:flipo@postgres:5432/flipo?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      BOT_TOKEN: ${BOT_TOKEN}
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../logs:/var/log/flipo

  web:
    build:
      context: ..
      dockerfile: deploy/docker/web.Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
      NEXT_PUBLIC_WS_URL: ws://localhost:8080
    depends_on:
      - api

volumes:
  postgres_data:
